apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
      - name: wordpress
        image: 653135932463.dkr.ecr.eu-west-2.amazonaws.com/wordpress:1.0
        ports:
        - containerPort: 80
        env:
        - name: WORDPRESS_DB_HOST
          value: "terraform-20260430183248259200000005.cdy4cwskyjil.eu-west-2.rds.amazonaws.com"
        - name: WORDPRESS_DB_USER
          value: "admin"
        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wp-db-secret
              key: password
        - name: WORDPRESS_DB_NAME
          value: "mydb"