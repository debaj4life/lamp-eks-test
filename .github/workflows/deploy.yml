name: Build And Deploy WordPress

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docker/**'
      - 'kubernetes/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  EKS_CLUSTER_NAME: techrite-eks-cluster-nonprod
  ECR_REPOSITORY: wordpress
  K8S_DEPLOYMENT_NAME: wordpress
  K8S_CONTAINER_NAME: wordpress

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" ./docker
          docker tag "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Install kubectl
        run: |
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Check EKS cluster availability
        id: check-eks
        run: |
          if aws eks describe-cluster --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME" >/dev/null 2>&1; then
            echo "cluster_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "cluster_exists=false" >> "$GITHUB_OUTPUT"
            echo "EKS cluster '$EKS_CLUSTER_NAME' not found in region '$AWS_REGION'. Skipping Kubernetes deploy steps."
          fi

      - name: Update kubeconfig
        if: steps.check-eks.outputs.cluster_exists == 'true'
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Create or update WordPress DB secret
        if: steps.check-eks.outputs.cluster_exists == 'true'
        env:
          WORDPRESS_DB_PASSWORD: ${{ secrets.WORDPRESS_DB_PASSWORD }}
        run: |
          if [ -z "$WORDPRESS_DB_PASSWORD" ]; then
            echo "WORDPRESS_DB_PASSWORD is not set; skipping wp-db-secret update."
          else
            kubectl create secret generic wp-db-secret \
              --from-literal=password="$WORDPRESS_DB_PASSWORD" \
              --dry-run=client \
              -o yaml | kubectl apply -f -
          fi

      - name: Apply Kubernetes manifests
        if: steps.check-eks.outputs.cluster_exists == 'true'
        run: |
          kubectl apply -f kubernetes/wordpress-deployment.yaml
          kubectl apply -f kubernetes/wordpress-service.yaml

      - name: Update deployment image
        if: steps.check-eks.outputs.cluster_exists == 'true'
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
        run: |
          kubectl set image deployment/$K8S_DEPLOYMENT_NAME \
            $K8S_CONTAINER_NAME="$IMAGE_URI"
          kubectl rollout status deployment/$K8S_DEPLOYMENT_NAME --timeout=5m